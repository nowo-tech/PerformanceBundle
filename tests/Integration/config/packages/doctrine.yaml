doctrine:
    dbal:
        url: 'sqlite:///:memory:'
        driver: pdo_sqlite
    orm:
        naming_strategy: doctrine.orm.naming_strategy.underscore_number_aware
        mappings:
            NowoPerformanceBundle:
                is_bundle: false
                type: attribute
                dir: '%kernel.project_dir%/../../src/Entity'
                prefix: 'Nowo\PerformanceBundle\Entity'
